version: '3.9'

services:
  app:
    build: .
    container_name: okx-grid-monitor
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
      - ./src/web/templates:/app/src/web/templates
    env_file:
      - .env
    restart: unless-stopped
    tty: true
    stdin_open: true
